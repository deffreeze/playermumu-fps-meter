<style>
:root{--b:#1a73e8}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;max-width:760px;margin:0 auto;padding:24px;color:#1f2937;line-height:1.7;background:#fff}

<body>
<h1>FPS 帧率测试</h1>
<p>点击开始后，本工具用 requestAnimationFrame 实时测量你当前画面的帧率（当前/平均/最高/最低 FPS）。全部在本地浏览器运行，不上传数据。</p>
<div class="card">
<button id="b">开始测试 FPS</button>
<div id="out">点击开始，移动鼠标或滚动页面以测真实帧率（本地运行）。</div>
<script>
var b=document.getElementById('b'),o=document.getElementById('out');
var run=false,last=0,frames=0,fps=0,min=1e9,max=0,acc=0,n=0;
function loop(ts){if(!run)return;
if(last){var dt=ts-last;if(dt>0){fps=Math.round(1000/dt);if(fps<min)min=fps;if(fps>max)max=fps;acc+=fps;n++;}}
last=ts;frames++;
if(frames%10===0){o.innerHTML='<table>'+[['当前 FPS',fps],['平均 FPS',n?Math.round(acc/n):0],['最低 FPS',min===1e9?0:min],['最高 FPS',max],['采样帧数',frames]].map(function(r){return '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>'}).join('')+'</table>';}
requestAnimationFrame(loop);}
b.onclick=function(){if(run){run=false;b.textContent='开始测试 FPS';}else{run=true;last=0;frames=0;min=1e9;max=0;acc=0;n=0;b.textContent='停止';requestAnimationFrame(loop);}};
</script>
</div>
